name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "21 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install bandit[sarif]
      - name: Run Bandit
        run: bandit -r agent_core -f sarif -o bandit.sarif || true
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif
          category: bandit

  pip_audit:
    name: pip-audit (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip pip-audit
      - name: Audit dependencies
        # CVE-2026-3219 is in `pip` itself (the runner's bundled pip),
        # not in any agent_core dependency. No fix is published yet;
        # the `pip install --upgrade pip` above will pick the patched
        # version up automatically once it ships, at which point this
        # --ignore-vuln line can be dropped.
        run: pip-audit --strict --ignore-vuln CVE-2026-3219

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
